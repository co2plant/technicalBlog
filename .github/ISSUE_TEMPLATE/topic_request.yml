name: "📝 포스트 주제 제안 (Topic Request)"
description: 향후 블로그에서 다루거나 알아보고 싶은 주제를 메모해두고 관리합니다.
title: "[주제 제안]: <다루고 싶은 주제를 요약해주세요>"
labels: ["topic", "enhancement"]
body:
  - type: markdown
    attributes:
      value: "### 새로운 블로그 작성 포인트 찾기 💡\n학습하고 싶거나 정리해 두고 싶은 주제를 이곳에 자유롭게 남겨 관리하세요!"
  - type: textarea
    id: description
    attributes:
      label: 주제에 대한 상세 설명
      description: 어떤 내용이 궁금한지, 블로그 글로 작성했을 때 다루고 싶은 핵심 포인트가 무엇인지 적어주세요.
      placeholder: "예: Tailwind CSS v4의 바뀐 점과 이전 버전 대비 성능을 블로그 글로 정리해보고 싶습니다."
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 참고 자료 및 링크 (선택)
      description: 리서치에 도움이 될 만한 공식 문서나 관련 아티클이 있다면 남겨주세요.
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: 우선순위 (학습 의지)
      description: 이 주제를 얼마나 빨리 다뤄보고 싶으신가요?
      options:
        - "🔥 높음 (가장 먼저 작성할 예정)"
        - "🏃 보통 (시간 날 때 리서치 예정)"
        - "🐢 낮음 (언젠가 다뤄볼 예정)"
    validations:
      required: true
